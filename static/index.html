<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PDF Voice Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>🎙️ PDF Voice Assistant</h1>
        
        <div class="section">
            <input type="file" id="pdfFile" accept=".pdf">
            <button onclick="uploadPDF()" id="uploadBtn">Upload & Process PDF</button>
            <p id="status"></p>
        </div>

        <div class="chat-section">
            <button id="recordBtn">🎤 Hold to Speak</button>
            <p id="chatStatus">Click & hold to ask a question</p>
            <div id="responseArea"></div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
